name: Deploy DeepSky VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deepsky-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update VPS repo
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2
          git fetch origin main
          git reset --hard origin/main
          git lfs pull

      - name: Verify footer source exists
        shell: powershell
        run: |
          $webApp = "C:\Apps\deepskyv2\DeepSky\app\web_app.py"

          if (-not (Test-Path -LiteralPath $webApp)) {
            throw "Missing live web_app.py at $webApp"
          }

          if (-not (Select-String -LiteralPath $webApp -Pattern "DeepSky Processor Built By" -Quiet)) {
            throw "Live web_app.py does not contain footer marker."
          }

          Write-Host "Verified footer marker in $webApp"

      - name: Install Python dependencies
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2\DeepSky
          C:\Python311\pkg\tools\python.exe -m pip install -r requirements.txt

      - name: Restart DeepSky web app
        shell: powershell
        run: |
          $appRoot = "C:\Apps\deepskyv2\DeepSky"
          $pythonExe = "C:\Python311\pkg\tools\python.exe"
          $logDir = "C:\Apps\deepskyv2\logs"
          $outLog = Join-Path $logDir "deepsky-web.out.log"
          $errLog = Join-Path $logDir "deepsky-web.err.log"

          New-Item -ItemType Directory -Force -Path $logDir | Out-Null

          Write-Host "Stopping any process listening on port 8000..."
          Get-NetTCPConnection -LocalPort 8000 -State Listen -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty OwningProcess -Unique |
            ForEach-Object {
              Write-Host "Stopping port 8000 process $_"
              Stop-Process -Id $_ -Force -ErrorAction SilentlyContinue
            }

          Get-CimInstance Win32_Process -Filter "name = 'python.exe' or name = 'pythonw.exe'" |
            Where-Object { $_.CommandLine -like "*uvicorn*app.web_app*" -or $_.CommandLine -like "*C:\Apps\deepskyv2\DeepSky*" } |
            ForEach-Object {
              Write-Host "Stopping stale DeepSky process $($_.ProcessId): $($_.CommandLine)"
              Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
            }

          Start-Sleep -Seconds 3

          Write-Host "Starting DeepSky web app from $appRoot..."
          $process = Start-Process `
            -FilePath $pythonExe `
            -ArgumentList @("-m", "uvicorn", "app.web_app:app", "--host", "127.0.0.1", "--port", "8000") `
            -WorkingDirectory $appRoot `
            -RedirectStandardOutput $outLog `
            -RedirectStandardError $errLog `
            -WindowStyle Hidden `
            -PassThru

          Write-Host "Started DeepSky process $($process.Id)"

          $served = $false
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            Start-Sleep -Seconds 5
            Write-Host "Checking DeepSky localhost attempt $attempt..."

            try {
              $html = (Invoke-WebRequest -Uri "http://127.0.0.1:8000/?v=$env:GITHUB_SHA" -UseBasicParsing -TimeoutSec 20).Content

              if ($html.Contains("DeepSky Processor Built By")) {
                $served = $true
                break
              }

              Write-Host "DeepSky responded, but did not serve the new footer marker yet."
            } catch {
              Write-Host "DeepSky not ready yet: $($_.Exception.Message)"
            }
          }

          if (-not $served) {
            Write-Host "DeepSky processes after failed verification:"
            Get-CimInstance Win32_Process -Filter "name = 'python.exe' or name = 'pythonw.exe'" |
              Where-Object { $_.CommandLine -like "*uvicorn*" -or $_.CommandLine -like "*C:\Apps\deepskyv2\DeepSky*" } |
              Select-Object ProcessId, CommandLine |
              Format-List
            throw "Local DeepSky app did not serve the footer marker after restart."
          }

          Write-Host "DeepSky deployed, restarted, and verified."
