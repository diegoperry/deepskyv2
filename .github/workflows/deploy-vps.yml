name: Deploy DeepSky VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deepsky-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update VPS repo
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2
          git fetch origin main
          git reset --hard origin/main
          git lfs pull

      - name: Install dependencies
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2\DeepSky
          C:\Python311\pkg\tools\python.exe -m pip install -r requirements.txt

      - name: Restart DeepSky
        shell: powershell
        run: |
          C:\Windows\System32\schtasks.exe /End /TN "DeepSky Web App"
          Start-Sleep -Seconds 5
          C:\Windows\System32\schtasks.exe /Run /TN "DeepSky Web App"
          Start-Sleep -Seconds 8
          $response = Invoke-WebRequest -Uri "http://127.0.0.1:8000/?v=$env:GITHUB_SHA" -UseBasicParsing -TimeoutSec 20
          if ($response.StatusCode -ne 200) {
            throw "DeepSky health check failed."
          }
          Write-Host "DeepSky deployed, restarted, and returned HTTP 200."
