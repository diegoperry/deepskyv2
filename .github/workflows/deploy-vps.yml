name: Deploy DeepSky VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deepsky-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code on VPS
        shell: cmd
        run: |
          cd /d C:\Apps\deepskyv2
          "C:\Program Files\Git\cmd\git.exe" fetch origin main
          "C:\Program Files\Git\cmd\git.exe" reset --hard origin/main
          "C:\Program Files\Git\cmd\git.exe" lfs pull

      - name: Install Python dependencies
        shell: cmd
        run: |
          cd /d C:\Apps\deepskyv2\DeepSky
          C:\Python311\pkg\tools\python.exe -m pip install -r requirements.txt

      - name: Restart DeepSky web app
        shell: cmd
        run: |
          C:\Windows\System32\schtasks.exe /End /TN "DeepSky Web App"
          timeout /t 3 /nobreak
          C:\Windows\System32\schtasks.exe /Run /TN "DeepSky Web App"
          timeout /t 5 /nobreak
          C:\Windows\System32\netstat.exe -ano | C:\Windows\System32\findstr.exe :8000
          echo DeepSky deployed and restarted.
