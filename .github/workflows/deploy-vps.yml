name: Deploy DeepSky VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deepsky-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update VPS repo
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2
          git fetch origin main
          git reset --hard origin/main
          git lfs pull

      - name: Install dependencies
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2\DeepSky
          python -m pip install -r requirements.txt

      - name: Restart DeepSky
        shell: powershell
        run: |
          C:\Windows\System32\schtasks.exe /End /TN "DeepSky Web App"
          Start-Sleep -Seconds 5
          C:\Windows\System32\schtasks.exe /Run /TN "DeepSky Web App"
          Start-Sleep -Seconds 5
          C:\Windows\System32\netstat.exe -ano | C:\Windows\System32\findstr.exe :8000
          Write-Host "DeepSky deployed and restarted."
