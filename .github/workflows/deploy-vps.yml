name: Deploy DeepSky VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deepsky-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Sync latest code on VPS
        shell: powershell
        run: |
          $source = $env:GITHUB_WORKSPACE
          $repoPath = "C:\Apps\deepskyv2"

          Write-Host "Workspace: $source"
          Write-Host "Deploy path: $repoPath"

          New-Item -ItemType Directory -Force $repoPath | Out-Null
          New-Item -ItemType Directory -Force "$repoPath\DeepSky" | Out-Null

          C:\Windows\System32\robocopy.exe "$source\DeepSky\app" "$repoPath\DeepSky\app" /MIR /XD __pycache__
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy DeepSky\app failed with exit code $LASTEXITCODE"
          }
          $global:LASTEXITCODE = 0

          Copy-Item -LiteralPath "$source\DeepSky\requirements.txt" -Destination "$repoPath\DeepSky\requirements.txt" -Force
          Copy-Item -LiteralPath "$source\DeepSky\README.md" -Destination "$repoPath\DeepSky\README.md" -Force
          Copy-Item -LiteralPath "$source\README.md" -Destination "$repoPath\README.md" -Force -ErrorAction SilentlyContinue

      - name: Install Python dependencies
        shell: powershell
        run: |
          $python = "C:\Python311\pkg\tools\python.exe"
          if (-not (Test-Path $python)) {
            $python = "python"
          }

          cd C:\Apps\deepskyv2\DeepSky
          & $python -m pip install -r requirements.txt

      - name: Restart DeepSky web app
        shell: powershell
        run: |
          C:\Windows\System32\schtasks.exe /End /TN "DeepSky Web App"
          Start-Sleep -Seconds 3
          C:\Windows\System32\schtasks.exe /Run /TN "DeepSky Web App"
          Start-Sleep -Seconds 5
          C:\Windows\System32\netstat.exe -ano | C:\Windows\System32\findstr.exe :8000
          Write-Host "DeepSky deployed and restarted."
