name: Deploy DeepSky VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deepsky-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code on VPS
        shell: powershell
        run: |
          $repoPath = "C:\Apps\deepskyv2"
          $git = "C:\Program Files\Git\cmd\git.exe"
          if (-not (Test-Path $git)) {
            $git = "git"
          }

          function Invoke-Git {
            & $git @args
            if ($LASTEXITCODE -ne 0) {
              throw "git $args failed with exit code $LASTEXITCODE"
            }
          }

          New-Item -ItemType Directory -Force C:\Apps | Out-Null

          if (-not (Test-Path "$repoPath\.git")) {
            if (Test-Path $repoPath) {
              Remove-Item -LiteralPath $repoPath -Recurse -Force
            }
            Invoke-Git clone https://github.com/diegoperry/deepskyv2.git $repoPath
          }

          cd $repoPath
          Invoke-Git fetch origin main
          Invoke-Git reset --hard origin/main
          Invoke-Git status --short
          Invoke-Git rev-parse --short HEAD

          & $git lfs version
          if ($LASTEXITCODE -eq 0) {
            Invoke-Git lfs pull
          } else {
            Write-Host "Git LFS is not installed on the runner; skipping git lfs pull."
            $global:LASTEXITCODE = 0
          }

      - name: Install Python dependencies
        shell: powershell
        run: |
          $python = "C:\Python311\pkg\tools\python.exe"
          if (-not (Test-Path $python)) {
            $python = "python"
          }

          cd C:\Apps\deepskyv2\DeepSky
          & $python -m pip install -r requirements.txt

      - name: Restart DeepSky web app
        shell: powershell
        run: |
          C:\Windows\System32\schtasks.exe /End /TN "DeepSky Web App"
          Start-Sleep -Seconds 3
          C:\Windows\System32\schtasks.exe /Run /TN "DeepSky Web App"
          Start-Sleep -Seconds 5
          C:\Windows\System32\netstat.exe -ano | C:\Windows\System32\findstr.exe :8000
          Write-Host "DeepSky deployed and restarted."
