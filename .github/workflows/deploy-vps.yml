name: Deploy DeepSky VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deepsky-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update VPS repo
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2
          git fetch origin main
          git reset --hard origin/main
          git lfs pull

      - name: Install Python dependencies
        shell: powershell
        run: |
          cd C:\Apps\deepskyv2\DeepSky
          C:\Python311\pkg\tools\python.exe -m pip install -r requirements.txt

      - name: Restart DeepSky web app
        shell: powershell
        run: |
          function Test-DeepSkyHttp200 {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:8000/process" -UseBasicParsing -TimeoutSec 20
              Write-Host "DeepSky localhost status: $($response.StatusCode)"
              $hasNarrowbandCheckbox = $response.Content.Contains('id="narrowbandColor" name="narrowband_color" type="checkbox"')
              $hasRemovedPixelButton = $response.Content.Contains('data-restore-kind="pixel"')
              Write-Host "Narrowband checkbox present: $hasNarrowbandCheckbox"
              Write-Host "Legacy Pixel Restoration button present: $hasRemovedPixelButton"
              return $response.StatusCode -eq 200 -and $hasNarrowbandCheckbox -and -not $hasRemovedPixelButton
            } catch {
              Write-Host "DeepSky health check failed: $($_.Exception.Message)"
              return $false
            }
          }

          Write-Host "Stopping DeepSky Web App scheduled task if it is running..."
          C:\Windows\System32\schtasks.exe /End /TN "DeepSky Web App"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Task was not running or could not be ended cleanly; continuing."
          }

          Write-Host "Stopping any stale process still listening on port 8000..."
          $listeners = Get-NetTCPConnection -LocalPort 8000 -State Listen -ErrorAction SilentlyContinue
          foreach ($listener in $listeners) {
            Write-Host "Stopping stale port-8000 process $($listener.OwningProcess)."
            Stop-Process -Id $listener.OwningProcess -Force -ErrorAction SilentlyContinue
          }
          Start-Sleep -Seconds 2

          $remaining = Get-NetTCPConnection -LocalPort 8000 -State Listen -ErrorAction SilentlyContinue
          if ($remaining) {
            throw "Port 8000 is still occupied after stopping the previous DeepSky process."
          }

          Write-Host "Starting DeepSky Web App scheduled task..."
          C:\Windows\System32\schtasks.exe /Run /TN "DeepSky Web App"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to start DeepSky Web App scheduled task."
          }

          Start-Sleep -Seconds 10

          if (-not (Test-DeepSkyHttp200)) {
            Write-Host "First health check failed. Starting task again and retrying once..."
            C:\Windows\System32\schtasks.exe /Run /TN "DeepSky Web App"
            Start-Sleep -Seconds 10

            if (-not (Test-DeepSkyHttp200)) {
              throw "DeepSky did not return HTTP 200 after retry."
            }
          }

          Write-Host "DeepSky deployed, scheduled task restarted, and HTTP 200 verified."
